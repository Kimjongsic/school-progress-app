<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
  <title>수업 진도</title>
  
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="수업 진도">
  <link rel="apple-touch-icon" href="/icon.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Pretendard', sans-serif; -webkit-font-smoothing: antialiased; background-color: #F8FAFC; }
    .view-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    
    /* 시간표 그리드 스타일 */
    .setup-table { table-layout: fixed; width: 100%; border-collapse: collapse; background: white; border: 1px solid #E2E8F0; }
    .setup-table th, .setup-table td { border: 1px solid #E2E8F0; vertical-align: middle; padding: 4px; }
    .header-cell { background: #F8FAFC; color: #1E293B; font-weight: 800; font-size: 12px; }
    .setup-in { 
      width: 100%; border-radius: 20px; border: 1.5px solid #F1F5F9; 
      padding: 6px 0; text-align: center; font-size: 10px; 
      font-weight: 800; background: #F8FAFC; color: #CBD5E0; transition: all 0.2s; cursor: pointer;
      white-space: nowrap; overflow: hidden;
    }
    .setup-in.active-cell { border: 2px solid #005CC5 !important; background: white; color: #005CC5 !important; }
    .sub-filled { color: white !important; border: none !important; }
    .gc-filled { background: white !important; font-weight: 900 !important; }
    .gc-cell { height: 24px; border-radius: 10px; margin-top: 4px; aspect-ratio: auto; }

    /* 오버레이 및 시트 */
    .overlay-target { position: fixed; inset: 0; background: rgba(0,0,0,0); z-index: 140; pointer-events: none; transition: background 0.3s; }
    .overlay-show { background: rgba(0,0,0,0.4) !important; pointer-events: auto !important; backdrop-filter: blur(2px); }
    .bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top-left-radius: 40px; border-top-right-radius: 40px; transform: translateY(100%); transition: transform 0.3s; z-index: 150; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .mini-input-chip { background: white; border: 2px solid #005CC5; border-radius: 12px; padding: 4px 10px; font-size: 11px; font-weight: 700; width: 80px; outline: none; }
    .teacher-name-highlight { color: #005CC5; font-weight: 900; }
    .page-title { font-size: 24px; font-weight: 900; color: #0F172A; }
    .header-action-btn { width: 44px; height: 44px; background-color: #F1F5F9; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #64748B; }
  </style>
</head>
<body class="text-slate-900 select-none">

  <div id="app" class="max-w-md mx-auto min-h-screen relative flex flex-col bg-white shadow-2xl">
    
    <section id="loadingView" class="view-transition hidden fixed inset-0 z-[300] bg-white/70 backdrop-blur-sm flex flex-col items-center justify-center">
      <i class="fa-solid fa-spinner fa-spin text-4xl text-[#005CC5]"></i>
    </section>

    <section id="loginView" class="view-transition hidden fixed inset-0 z-50 bg-white flex flex-col justify-center px-10">
      <div class="mb-12">
        <i class="fa-solid fa-layer-group text-5xl text-[#005CC5] mb-6"></i>
        <h1 class="text-3xl font-black text-slate-900 leading-tight">Class Flow</h1>
        <p class="mt-2 text-slate-400 font-bold">수업 기록의 흐름을 잇다</p>
      </div>
      <div class="space-y-3">
        <input type="text" id="loginName" placeholder="성함" class="w-full p-5 rounded-2xl bg-slate-50 border-none font-bold outline-none focus:ring-2 ring-blue-100">
        <input type="password" id="loginPin" placeholder="비밀번호 4자리" class="w-full p-5 rounded-2xl bg-slate-50 border-none font-bold outline-none focus:ring-2 ring-blue-100">
        <button id="btnLogin" class="w-full bg-[#005CC5] text-white p-5 rounded-2xl font-black text-lg mt-4 shadow-xl shadow-blue-100 active:scale-95 transition-all">로그인</button>
        <button id="btnOpenSignUp" class="w-full text-slate-400 font-bold py-4 text-sm underline underline-offset-4">처음이신가요? 가입하기</button>
      </div>
    </section>

    <section id="signUpContainer" class="view-transition hidden fixed inset-0 z-[100] bg-white flex flex-col">
      <header class="p-8 flex justify-between items-center bg-white">
        <button id="btnSignUpBack" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-50 text-slate-400"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="flex-1 h-1.5 mx-4 bg-slate-100 rounded-full overflow-hidden"><div id="signUpProgress" class="h-full bg-[#005CC5] transition-all duration-500"></div></div>
        <button id="btnSignUpClose" class="header-action-btn"><i class="fa-solid fa-xmark"></i></button>
      </header>
      <div class="flex-1 px-8 py-2 overflow-y-auto no-scrollbar">
        <div id="step1" class="signUpStep hidden">
          <h2 class="text-2xl font-black mb-8">기본 정보를<br>입력해 주세요.</h2>
          <input type="text" id="regName" placeholder="성함" class="w-full p-5 rounded-2xl border-2 border-slate-50 font-bold mb-4 outline-none focus:border-[#005CC5] bg-slate-50">
          <input type="password" id="regPin" maxlength="4" placeholder="비밀번호 4자리" class="w-full p-5 rounded-2xl border-2 border-slate-50 font-bold outline-none focus:border-[#005CC5] bg-slate-50">
        </div>
        <div id="step2" class="signUpStep hidden"><h2 class="text-2xl font-black mb-6">담당 과목 등록</h2><div id="subTagContainer" class="flex flex-wrap gap-2"></div></div>
        <div id="step3" class="signUpStep hidden"><h2 class="text-2xl font-black mb-6">학급 등록</h2><div id="gcTagContainer" class="flex flex-wrap gap-2"></div></div>
        <div id="step4" class="signUpStep hidden">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black">시간표 완성</h2>
            <button onclick="window.toggleTagEditMode('setup')" class="text-[9px] font-black px-2 py-1 bg-slate-50 text-[#005CC5] rounded-md border border-blue-50" id="btnEditTagsStep4">편집</button>
          </div>
          <div class="bg-slate-50 p-5 rounded-2xl mb-6 space-y-4">
            <div id="quickSubSection" class="flex flex-wrap gap-2 justify-center"></div>
            <div id="quickGcSection" class="flex flex-wrap gap-2 justify-center"></div>
          </div>
          <table class="setup-table"><tbody id="setupTableBody"></tbody></table>
          <div class="flex gap-2 mt-4 justify-center"><button id="btnAddPeriod" class="px-4 py-2 bg-slate-100 rounded-full text-[11px] font-black border">+ 교시</button><button id="btnRemovePeriod" class="px-4 py-2 bg-slate-100 rounded-full text-[11px] font-black text-rose-400 border">- 교시</button></div>
        </div>
      </div>
      <footer class="p-8 flex justify-center"><button id="btnNextStep" class="w-4/5 bg-slate-900 text-white py-4 rounded-2xl font-bold active:scale-95 transition-all">다음 단계</button></footer>
    </section>

    <section id="editTimetableView" class="view-transition hidden fixed inset-0 z-[120] bg-white flex flex-col">
      <header class="p-8 flex justify-between items-center bg-white border-b">
        <div class="text-left">
          <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1"><span id="editViewTeacherName" class="teacher-name-highlight">...</span> 선생님</p>
          <h1 class="text-xl font-black">전체 시간표 수정</h1>
        </div>
        <button onclick="initApp()" class="header-action-btn"><i class="fa-solid fa-xmark text-xl"></i></button>
      </header>
      <div class="flex-1 px-8 py-6 overflow-y-auto no-scrollbar">
        <div class="bg-slate-50 p-5 rounded-2xl mb-6 space-y-4 border border-slate-100">
          <div class="flex justify-between items-center px-1">
            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">항목 선택</span>
            <button onclick="window.toggleTagEditMode('edit')" class="text-[9px] font-black px-2 py-1 bg-white text-[#005CC5] rounded-md border border-blue-50" id="btnEditTagsEditView">편집</button>
          </div>
          <div id="editQuickSub" class="flex flex-wrap gap-2 justify-center"></div>
          <div class="h-px bg-slate-200/50 mx-4"></div>
          <div id="editQuickGc" class="flex flex-wrap gap-2 justify-center"></div>
        </div>
        <table class="setup-table"><tbody id="editTableBody"></tbody></table>
        <div class="flex gap-2 mt-6 justify-center pb-10">
          <button id="btnAddPeriodEdit" class="px-4 py-2 bg-slate-100 rounded-full text-[11px] font-black border">+ 교시</button>
          <button id="btnRemovePeriodEdit" class="px-4 py-2 bg-slate-100 rounded-full text-[11px] font-black text-rose-400 border">- 교시</button>
        </div>
      </div>
      <footer class="p-8 flex justify-center"><button id="btnSaveEditedTimetable" class="w-4/5 bg-[#005CC5] text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-100 active:scale-95 transition-all">수정 완료</button></footer>
    </section>

    <main id="mainView" class="view-transition hidden flex-1 pb-10">
      <header class="p-8 flex justify-between items-end bg-white">
        <div class="flex-1 text-left">
          <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1"><span id="userNameDisplay" class="teacher-name-highlight">...</span> 선생님</p>
          <h1 class="page-title">수업 대시보드</h1>
        </div>
        <button id="btnSettings" class="header-action-btn"><i class="fa-solid fa-gear text-xl"></i></button>
      </header>
      <div class="px-8 mb-6">
        <div class="flex items-center gap-2 bg-slate-50 p-1.5 rounded-2xl">
          <button id="btnPrevDate" class="w-12 h-12 flex items-center justify-center text-slate-400"><i class="fa-solid fa-chevron-left text-xl"></i></button>
          <div id="dateTextGroup" class="relative flex-1 text-center cursor-pointer active:bg-slate-100 rounded-xl transition-all">
            <h2 id="currentDateDisplay" class="text-sm font-black text-slate-700 py-3 tracking-tight">...</h2>
            <input type="date" id="datePicker" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full">
          </div>
          <button id="btnNextDate" class="w-12 h-12 flex items-center justify-center text-slate-400"><i class="fa-solid fa-chevron-right text-xl"></i></button>
        </div>
      </div>
      <div id="timetableList" class="px-8 space-y-4"></div>
    </main>

    <div id="sheetOverlay" class="overlay-target"></div>
    <div id="settingsOverlay" class="overlay-target"></div>

    <div id="settingsSheet" class="bottom-sheet px-8 pt-4 pb-12 text-center">
      <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-10"></div>
      <div class="space-y-3 px-2">
        <button id="btnMenuEditTime" class="w-full p-5 rounded-2xl bg-slate-50 flex items-center gap-4 text-left group">
          <div class="w-10 h-10 bg-blue-50 text-[#005CC5] rounded-xl flex items-center justify-center group-active:scale-90 transition-transform"><i class="fa-solid fa-calendar-days"></i></div>
          <span class="font-bold text-slate-700">전체 시간표 수정</span>
        </button>
        <button id="btnMenuLogout" class="w-full p-5 rounded-2xl bg-slate-50 flex items-center gap-4 text-rose-500 text-left group">
          <div class="w-10 h-10 bg-rose-50 text-rose-500 rounded-xl flex items-center justify-center group-active:scale-90 transition-transform"><i class="fa-solid fa-arrow-right-from-bracket"></i></div>
          <span class="font-bold">로그아웃</span>
        </button>
        <button id="btnMenuInquiry" class="w-full p-5 rounded-2xl bg-slate-50 flex items-center gap-4 text-slate-500 text-left group">
          <div class="w-10 h-10 bg-slate-100 text-slate-500 rounded-xl flex items-center justify-center group-active:scale-90 transition-transform"><i class="fa-solid fa-comment-dots"></i></div>
          <span class="font-bold">문의 안내</span>
        </button>
      </div>
    </div>

    <div id="inputSheet" class="bottom-sheet px-10 pt-4 pb-12 text-left">
      <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-10"></div>
      <div id="sheetTagContainer" class="flex items-center gap-2 mb-6"></div>
      <div class="space-y-6">
        <div><label class="text-[10px] font-black text-amber-500 mb-2 block uppercase tracking-widest">Last Record</label><div class="p-5 bg-slate-50 rounded-[24px] border border-slate-100"><p id="prevProgressText" class="text-slate-700 font-bold text-sm leading-relaxed">-</p></div></div>
        <div><label class="text-[10px] font-black text-[#005CC5] mb-2 block uppercase tracking-widest">Today's Progress</label><input type="text" id="progContent" placeholder="진도를 입력하세요" class="w-full p-5 rounded-[24px] bg-slate-50 border-none font-bold outline-none focus:ring-2 ring-blue-50"></div>
        <div><label class="text-[10px] font-black text-slate-400 mb-2 block uppercase tracking-widest">Memo</label><textarea id="progNote" placeholder="메모할 내용" rows="2" class="w-full p-5 rounded-[24px] bg-slate-50 border-none font-medium outline-none focus:ring-2 ring-slate-100"></textarea></div>
        <div class="flex justify-center pt-2"><button id="btnSaveProgress" class="w-4/5 bg-[#005CC5] text-white py-4 rounded-[24px] font-black shadow-xl active:scale-95 transition-all">기록 저장</button></div>
      </div>
    </div>

    <div id="moveSheet" class="bottom-sheet px-10 pt-4 pb-12 text-left">
        <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-10"></div>
        <header class="mb-8"><h3 class="text-2xl font-black text-slate-900 tracking-tight">수업 이동 / 결보강</h3></header>
        <div class="space-y-6">
          <div><label class="text-[10px] font-black text-slate-400 mb-2 block ml-1 uppercase tracking-widest">Target Date</label><input type="date" id="moveTargetDate" class="w-full p-5 rounded-[24px] bg-slate-50 font-bold outline-none border-none"></div>
          <div><label class="text-[10px] font-black text-slate-400 mb-2 block ml-1 uppercase tracking-widest">Target Period</label><select id="moveTargetPeriod" class="w-full p-5 rounded-[24px] bg-slate-50 font-bold outline-none border-none appearance-none text-center">
            <option value="1">1교시</option><option value="2">2교시</option><option value="3">3교시</option><option value="4">4교시</option><option value="5">5교시</option><option value="6">6교시</option><option value="7">7교시</option>
          </select></div>
          <div class="flex justify-center pt-4"><button id="btnConfirmMove" class="w-4/5 bg-slate-900 text-white py-4 rounded-[24px] font-black shadow-xl active:scale-95 transition-all">이동 확정</button></div>
        </div>
    </div>

    <div id="inquiryPopup" class="fixed inset-0 z-[200] hidden flex items-center justify-center px-8 text-center">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-md" onclick="document.getElementById('inquiryPopup').classList.add('hidden')"></div>
        <div class="relative bg-white rounded-[40px] p-10 w-full max-w-xs shadow-2xl">
          <div class="w-20 h-20 bg-blue-50 text-[#005CC5] rounded-[32px] flex items-center justify-center mx-auto mb-8 text-3xl"><i class="fa-solid fa-paper-plane"></i></div>
          <h3 class="text-2xl font-black text-slate-900 mb-4 tracking-tight">문의 안내</h3>
          <p class="text-slate-500 font-bold text-[15px] leading-relaxed mb-10">전주솔내고등학교 소속<br><span class="text-[#005CC5] font-black">김종식 선생님</span>께<br>JB메신저 쪽지를 보내주세요.</p>
          <button onclick="document.getElementById('inquiryPopup').classList.add('hidden')" class="w-full bg-slate-900 text-white py-5 rounded-[24px] font-bold text-lg active:scale-95 transition-all shadow-lg">확인</button>
        </div>
    </div>

  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
