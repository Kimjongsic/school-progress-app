<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>수업 진도 관리</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --primary: #1A365D; --primary-hover: #2c5282; --bg: #F1F5F9; --surface: #FFFFFF; --text-main: #2D3748; --text-muted: #718096; --border: #E2E8F0; --highlight: #EBF8FF; --danger: #E53E3E; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text-main); }
    .container { max-width: 480px; margin: 0 auto; background: var(--surface); border-radius: 24px; overflow: hidden; box-shadow: 0 12px 36px rgba(0,0,0,0.08); position: relative; min-height: 500px; }
    .view { padding: 25px 20px; transition: 0.3s; }
    .hidden { display: none !important; }
    input, textarea { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; box-sizing: border-box; outline: none; }
    button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 16px; margin-top: 10px; }
    .btn-outline { background: white; color: var(--text-muted); border: 1.5px solid var(--border); }
    .card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; cursor: pointer; }
    .period-badge { background: var(--primary); color: white; font-size: 12px; padding: 4px 8px; border-radius: 10px; }
    .setup-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
    .setup-table th, .setup-table td { padding: 5px; text-align: center; }
    .setup-in { width: 100%; border-radius: 15px; border: 1px solid var(--border); padding: 5px; text-align: center; font-size: 12px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .modal-box { background: white; padding: 20px; border-radius: 16px; width: 85%; max-width: 320px; }
  </style>
</head>
<body>
<div class="container">
  <div id="loginView" class="view hidden">
    <h2 style="text-align:center; color:var(--primary);">수업 진도 관리</h2>
    <input type="text" id="loginNameInput" placeholder="이름 (예: 김수학)" style="margin-top:20px;">
    <input type="password" id="loginPasswordInput" placeholder="비밀번호" style="margin-top:10px;">
    <button id="loginBtn">로그인</button>
    <button id="btnGoSignUp" class="btn-outline">처음 시작하기</button>
  </div>

  <div id="signUpView" class="view hidden" style="background:var(--primary); color:white;">
    <h2 style="text-align:center;">처음 시작하기 (1/3)</h2>
    <input type="text" id="signUpNameInput" placeholder="이름" style="margin-top:20px;">
    <input type="password" id="signUpPasswordInput" placeholder="비밀번호" style="margin-top:10px;">
    <button id="step1NextBtn" style="background:white; color:var(--primary);">다음</button>
    <button id="btnCancelSignUp" class="btn-outline" style="color:white; border-color:white;">취소</button>
  </div>

  <div id="preSetupSubView" class="view hidden" style="background:var(--primary); color:white;">
    <h2 style="text-align:center;">과목 등록 (2/3)</h2>
    <div id="subInputContainer"></div>
    <button id="btnAddSubInput" class="btn-outline" style="color:white;">+ 과목 추가</button>
    <button id="btnGoToStep3" style="background:white; color:var(--primary);">다음</button>
  </div>

  <div id="preSetupGcView" class="view hidden" style="background:var(--primary); color:white;">
    <h2 style="text-align:center;">학년반 등록 (3/3)</h2>
    <div id="gcInputContainer"></div>
    <button id="btnAddGcInput" class="btn-outline" style="color:white;">+ 학년 추가</button>
    <button id="btnGoToTimetable" style="background:white; color:var(--primary);">시간표 만들기</button>
  </div>

  <div id="dashView" class="view hidden">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <span id="dateText" style="font-weight:bold; font-size:18px;">날짜 로드 중...</span>
      <div id="btnOpenSettings" style="cursor:pointer;"><i class="fa-solid fa-gear"></i></div>
    </div>
    <input type="date" id="hiddenDate" style="margin: 10px 0;">
    <div id="dashList" style="margin-top:20px;"></div>
  </div>

  <div id="inputView" class="view hidden">
    <div id="inputTitle" style="font-weight:bold; margin-bottom:15px;"></div>
    <input type="text" id="progContent" placeholder="오늘 진도">
    <textarea id="progNotes" placeholder="메모" style="margin-top:10px;"></textarea>
    <div id="historyContainer" style="margin-top:15px; font-size:12px; color:var(--text-muted); max-height:150px; overflow-y:auto; border-top:1px dashed #ccc; padding-top:10px;"></div>
    <button id="saveBtn">저장</button>
    <button onclick="location.reload()" class="btn-outline">닫기</button>
  </div>

  <div id="setupView" class="view hidden">
    <h2 id="setupTitle">시간표 설정</h2>
    <div id="quickInputSection" style="margin-bottom:15px; padding:10px; border:1px dashed #ccc; border-radius:10px;">
        <div style="font-size:12px; font-weight:bold; margin-bottom:5px;">빠른 선택</div>
        <div id="quickSubBtns" style="display:flex; gap:5px; flex-wrap:wrap;"></div>
        <div id="quickGcBtns" style="display:flex; gap:5px; flex-wrap:wrap; margin-top:5px;"></div>
    </div>
    <table class="setup-table">
      <thead><tr><th></th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th></tr></thead>
      <tbody id="setupBody"></tbody>
    </table>
    <button id="saveSetupBtn">저장 및 반영</button>
    <button id="setupLogoutBtn" class="btn-outline">로그아웃</button>
  </div>

  <div id="loadingView" class="view hidden" style="text-align:center; padding-top:100px;">
    <i class="fa-solid fa-spinner fa-spin" style="font-size:40px; color:var(--primary);"></i>
    <p id="loadingText" style="margin-top:20px;">데이터를 불러오고 있습니다...</p>
  </div>
</div>

<script type="module" src="/main.js"></script>
</body>
</html>
