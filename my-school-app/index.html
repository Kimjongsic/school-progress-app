<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수업 진도 기록 앱</title>
  <!-- Tailwind CSS CDN 로드 -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

  <!-- index.html의 <body> 내부를 아래와 같이 업데이트하세요 -->

  <!-- 1. 로그인 화면 -->
  <div id="login-view" class="flex flex-col items-center justify-center min-h-screen px-4">
    <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md border border-slate-100">
      <h2 class="text-2xl font-bold text-center text-[#005CC5] mb-6">진도 기록 앱 로그인</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1">교사 이름</label>
          <input type="text" id="login-name" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#005CC5]" placeholder="이름을 입력하세요">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1">비밀번호 (숫자 4자리)</label>
          <input type="password" id="login-pin" maxlength="4" inputmode="numeric" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#005CC5] tracking-widest text-center text-xl" placeholder="••••">
        </div>
        <button id="btn-login" class="w-full bg-[#005CC5] text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition-colors shadow-sm">로그인</button>
        
        <!-- 회원가입 이동 버튼 추가 -->
        <p class="text-sm text-center text-slate-400 mt-4">
          처음이신가요? <button id="btn-go-signup" class="text-[#005CC5] font-semibold hover:underline">회원가입 하기</button>
        </p>
      </div>
    </div>
  </div>

  <!-- 1-2. 회원가입 화면 (추가된 부분, 초기에는 숨김) -->
  <div id="signup-view" class="hidden flex flex-col items-center justify-center min-h-screen px-4">
    <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md border border-slate-100">
      <h2 class="text-2xl font-bold text-center text-[#005CC5] mb-6">선생님 회원가입</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1">교사 이름</label>
          <input type="text" id="signup-name" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#005CC5]" placeholder="성함을 입력하세요 (공백없이)">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-600 mb-1">사용할 비밀번호 (숫자 4자리)</label>
          <input type="password" id="signup-pin" maxlength="4" inputmode="numeric" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#005CC5] tracking-widest text-center text-xl" placeholder="••••">
        </div>
        <button id="btn-signup-submit" class="w-full bg-[#005CC5] text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition-colors shadow-sm">가입하기</button>
        
        <!-- 로그인 이동 버튼 추가 -->
        <p class="text-sm text-center text-slate-400 mt-4">
          이미 계정이 있으신가요? <button id="btn-go-login" class="text-[#005CC5] font-semibold hover:underline">로그인으로 돌아가기</button>
        </p>
      </div>
    </div>
  </div>

  <!-- 2. 메인 대시보드 화면 (초기에는 숨김) -->
  <div id="dashboard-view" class="hidden max-w-2xl mx-auto px-4 py-6">
    <header class="flex justify-between items-center mb-6">
      <div>
        <h1 id="today-date" class="text-2xl font-bold text-slate-900">00월 00일 (요일)</h1>
        <p class="text-sm text-slate-500"><span id="user-name" class="font-semibold text-slate-700"></span> 선생님, 환영합니다.</p>
      </div>
      <button id="btn-logout" class="text-sm text-slate-400 hover:text-red-500 font-medium">로그아웃</button>
    </header>

    <!-- 오늘 수업 목록 리스트 -->
    <div class="space-y-4">
      <h3 class="text-lg font-semibold text-slate-700">오늘의 수업 시간표</h3>
      <div id="timetable-list" class="space-y-3">
        <!-- 자바스크립트가 여기에 수업 카드를 동적으로 생성합니다 -->
        <p class="text-slate-400 text-center py-8">오늘 배치된 수업이 없습니다.</p>
      </div>
    </div>
  </div>

  <!-- 3. 진도 입력 모달 팝업창 (초기에는 숨김) -->
  <div id="progress-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center px-4 z-50">
    <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-xl animate-fade-in">
      <div class="flex justify-between items-start mb-4">
        <div>
          <span id="modal-badge" class="inline-block bg-blue-50 text-[#005CC5] text-xs font-semibold px-2 py-1 rounded mb-1">1교시 | 2학년 6반</span>
          <h3 id="modal-title" class="text-xl font-bold text-slate-900">수학 진도 입력</h3>
        </div>
        <button id="btn-close-modal" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
      </div>
      
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">이전 진도</label>
          <div id="modal-prev-content" class="bg-slate-50 p-3 rounded-xl text-sm text-slate-600 border border-slate-100 min-h-[40px]">
            이전 기록이 없습니다.
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">오늘 나간 진도</label>
          <input type="text" id="input-content" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#005CC5]" placeholder="예: 교과서 45p ~ 48p 대단원 마무리">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">수업 메모</label>
          <textarea id="input-memo" rows="3" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[#005CC5]" placeholder="특이사항이나 다음 시간 전달사항을 적어주세요."></textarea>
        </div>
        <button id="btn-save-progress" class="w-full bg-[#005CC5] text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition-colors">진도 저장하기</button>
      </div>
    </div>
  </div>

  <!-- Vite 메인 자바스크립트 연결 -->
  <script type="module" src="/main.js"></script>
</body>
</html>
