<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Class Flow - 수업 관리</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;900&display=swap');
    body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #F8FAFC; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .teacher-name-highlight { color: #005CC5; font-weight: 900; }
    .setup-table { width: 100%; border-collapse: separate; border-spacing: 4px; }
    .setup-in { width: 100%; aspect-ratio: 1/1; border-radius: 14px; border: 2px dashed #E2E8F0; background: white; font-size: 10px; font-weight: 900; color: #CBD5E1; transition: all 0.2s; display: flex; align-items: center; justify-content: center; overflow: hidden; line-height: 1.2; padding: 2px; }
    .setup-in.active-cell { border-color: #005CC5; background: #EFF6FF; color: #005CC5; transform: scale(1.05); }
    .sub-filled { border-style: solid; border-color: transparent; color: white !important; }
    .gc-filled { border-style: solid; border-color: currentColor; background: white !important; }
    .bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top-left-radius: 32px; border-top-right-radius: 32px; transform: translateY(100%); transition: transform 0.4s; z-index: 150; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); max-height: 90vh; overflow-y: auto; }
    .overlay-target { position: fixed; inset: 0; background: rgba(15, 23, 42, 0); pointer-events: none; transition: background 0.4s; z-index: 140; }
    .overlay-show { background: rgba(15, 23, 42, 0.4); pointer-events: auto; }
    .mini-input-chip { width: 70px; height: 30px; border-radius: 10px; border: 2px solid #005CC5; padding: 0 5px; font-size: 11px; font-weight: 900; outline: none; }
  </style>
</head>
<body class="antialiased">

  <section id="loadingView" class="fixed inset-0 z-[200] bg-white flex flex-col items-center justify-center hidden">
    <div class="w-12 h-12 border-4 border-slate-100 border-t-[#005CC5] rounded-full animate-spin"></div>
  </section>

  <section id="loginView" class="fixed inset-0 z-[100] bg-white px-8 flex flex-col justify-center">
    <h1 class="text-3xl font-black text-slate-900 mb-8">Class Flow</h1>
    <div class="space-y-4">
      <input type="text" id="loginName" placeholder="성함" class="w-full bg-slate-50 px-6 py-4 rounded-2xl outline-none font-bold">
      <input type="password" id="loginPin" placeholder="PIN (4자리)" class="w-full bg-slate-50 px-6 py-4 rounded-2xl outline-none font-bold">
      <button id="btnLogin" class="w-full bg-[#005CC5] text-white py-4 rounded-2xl font-black shadow-lg">시작하기</button>
    </div>
    <button id="btnOpenSignUp" class="mt-8 text-slate-400 font-bold text-sm underline underline-offset-4">처음이신가요? 계정 만들기</button>
  </section>

  <section id="signUpContainer" class="hidden fixed inset-0 z-[110] bg-white flex flex-col">
    <header class="p-6 flex items-center justify-between">
      <button id="btnSignUpBack" class="w-10 h-10 text-slate-300"><i class="fa-solid fa-chevron-left"></i></button>
      <div class="h-1 flex-1 mx-4 bg-slate-100 rounded-full overflow-hidden">
        <div id="signUpProgress" class="h-full bg-[#005CC5] transition-all" style="width: 25%;"></div>
      </div>
      <button id="btnSignUpClose" class="w-10 h-10 text-slate-300"><i class="fa-solid fa-xmark"></i></button>
    </header>
    <div class="flex-1 px-8 py-4 overflow-y-auto no-scrollbar">
      <div id="step1" class="signUpStep space-y-6">
        <h2 class="text-2xl font-black">기본 정보를<br>입력해 주세요.</h2>
        <input type="text" id="regName" class="w-full bg-slate-50 px-6 py-4 rounded-2xl font-bold outline-none" placeholder="성함">
        <input type="password" id="regPin" maxlength="4" class="w-full bg-slate-50 px-6 py-4 rounded-2xl font-bold outline-none" placeholder="PIN (4자리)">
      </div>
      <div id="step2" class="signUpStep hidden space-y-4">
        <h2 class="text-2xl font-black">담당 과목 추가</h2>
        <div id="subTagContainer" class="flex flex-wrap gap-2"></div>
      </div>
      <div id="step3" class="signUpStep hidden space-y-4">
        <h2 class="text-2xl font-black">수업 학급 추가</h2>
        <div id="gcTagContainer" class="flex flex-wrap gap-2"></div>
      </div>
      <div id="step4" class="signUpStep hidden space-y-4">
        <div class="flex justify-between items-center">
          <h2 class="text-2xl font-black">시간표 완성</h2>
          <button id="btnEditTagsStep4" onclick="window.toggleTagEditMode('setup')" class="text-[10px] font-black px-3 py-1 bg-slate-50 text-[#005CC5] rounded-full border">편집</button>
        </div>
        <div class="bg-slate-50 p-4 rounded-2xl space-y-3">
          <div id="quickSubSection" class="flex flex-wrap gap-2 justify-center"></div>
          <div id="quickGcSection" class="flex flex-wrap gap-2 justify-center"></div>
        </div>
        <table class="setup-table">
          <tbody id="setupTableBody"></tbody>
        </table>
        <div class="flex gap-2 justify-center py-4">
          <button id="btnAddPeriod" class="px-4 py-2 bg-slate-100 rounded-full text-[10px] font-black">+ 교시</button>
          <button id="btnRemovePeriod" class="px-4 py-2 bg-slate-100 rounded-full text-[10px] font-black text-rose-400">- 교시</button>
        </div>
      </div>
    </div>
    <footer class="p-8"><button id="btnNextStep" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black">다음 단계</button></footer>
  </section>

  <section id="editTimetableView" class="hidden fixed inset-0 z-[120] bg-white flex flex-col">
    <header class="p-6 flex justify-between items-center border-b">
      <h1 class="text-xl font-black"><span id="editViewTeacherName" class="teacher-name-highlight">...</span> 선생님 시간표 수정</h1>
      <button onclick="initApp()" class="w-10 h-10 text-slate-400"><i class="fa-solid fa-xmark text-xl"></i></button>
    </header>
    <div class="flex-1 px-8 py-4 overflow-y-auto no-scrollbar">
      <div class="bg-slate-50 p-4 rounded-2xl mb-6 space-y-3">
        <div class="flex justify-between items-center px-1">
          <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">항목 선택</span>
          <button onclick="window.toggleTagEditMode('edit')" class="text-[10px] font-black px-3 py-1 bg-white text-[#005CC5] rounded-full border" id="btnEditTagsEditView">편집</button>
        </div>
        <div id="editQuickSub" class="flex flex-wrap gap-2 justify-center"></div>
        <div id="editQuickGc" class="flex flex-wrap gap-2 justify-center"></div>
      </div>
      <table class="setup-table">
        <tbody id="editTableBody"></tbody>
      </table>
      <div class="flex gap-2 mt-6 justify-center pb-10">
        <button id="btnAddPeriodEdit" class="px-4 py-2 bg-slate-100 rounded-full text-[10px] font-black border">+ 교시</button>
        <button id="btnRemovePeriodEdit" class="px-4 py-2 bg-slate-100 rounded-full text-[10px] font-black text-rose-400 border">- 교시</button>
      </div>
    </div>
    <footer class="p-8"><button id="btnSaveEditedTimetable" class="w-full bg-[#005CC5] text-white py-4 rounded-2xl font-black shadow-lg">수정 완료</button></footer>
  </section>

  <main id="mainView" class="hidden min-h-screen pb-24">
    <header class="px-8 pt-10 pb-6 flex justify-between items-end bg-white">
      <div id="dateTextGroup" class="cursor-pointer">
        <p class="text-xs font-semibold text-slate-400 mb-1"><span id="userNameDisplay" class="teacher-name-highlight">...</span> 선생님</p>
        <h1 id="currentDateDisplay" class="text-2xl font-black text-slate-900">...</h1>
        <input type="date" id="datePicker" class="opacity-0 absolute">
      </div>
      <button id="btnSettings" class="w-10 h-10 bg-slate-50 rounded-xl text-slate-400"><i class="fa-solid fa-gear"></i></button>
    </header>
    <div class="px-8 flex items-center gap-2 mb-6">
      <button id="btnPrevDate" class="w-8 h-8 rounded-lg bg-white border text-slate-400 flex items-center justify-center"><i class="fa-solid fa-chevron-left text-xs"></i></button>
      <div class="flex-1 text-center text-[11px] font-black text-slate-300 uppercase tracking-widest">Today's Class</div>
      <button id="btnNextDate" class="w-8 h-8 rounded-lg bg-white border text-slate-400 flex items-center justify-center"><i class="fa-solid fa-chevron-right text-xs"></i></button>
    </div>
    <div id="timetableList" class="px-8 space-y-4"></div>
  </main>

  <div id="sheetOverlay" class="overlay-target"></div>
  <div id="settingsOverlay" class="overlay-target"></div>

  <div id="settingsSheet" class="bottom-sheet p-8 space-y-4">
    <button id="btnMenuEditTime" class="w-full text-left py-4 flex items-center gap-4 border-b border-slate-50">
      <i class="fa-solid fa-calendar-days text-[#005CC5]"></i>
      <span class="font-bold">전체 시간표 수정</span>
    </button>
    <button id="btnMenuLogout" class="w-full text-left py-4 flex items-center gap-4 text-rose-500">
      <i class="fa-solid fa-right-from-bracket"></i>
      <span class="font-bold">로그아웃</span>
    </button>
  </div>

  <div id="inputSheet" class="bottom-sheet p-8">
    <div id="sheetTagContainer" class="flex gap-2 mb-6"></div>
    <div class="bg-slate-50 p-4 rounded-2xl mb-6"><p id="prevProgressText" class="text-sm font-bold text-slate-500 leading-relaxed">-</p></div>
    <input type="text" id="progContent" class="w-full bg-slate-50 px-6 py-4 rounded-2xl font-bold mb-4 outline-none" placeholder="오늘의 진도를 입력하세요.">
    <input type="text" id="progNote" class="w-full bg-slate-50 px-6 py-4 rounded-2xl font-bold mb-6 outline-none" placeholder="비고/메모">
    <button id="btnSaveProgress" class="w-full bg-[#005CC5] text-white py-4 rounded-2xl font-black">기록 저장</button>
  </div>

  <div id="moveSheet" class="bottom-sheet p-8 space-y-6">
    <h3 class="font-black text-xl">수업 이동</h3>
    <input type="date" id="moveTargetDate" class="w-full bg-slate-50 px-6 py-4 rounded-xl font-bold">
    <select id="moveTargetPeriod" class="w-full bg-slate-50 px-6 py-4 rounded-xl font-bold">
      <option value="1">1교시</option><option value="2">2교시</option><option value="3">3교시</option><option value="4">4교시</option><option value="5">5교시</option><option value="6">6교시</option><option value="7">7교시</option>
    </select>
    <button id="btnConfirmMove" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black">이동 확정</button>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
